# === Server Port ===
server.port=8081

# === DataSource ===
spring.datasource.url=jdbc:postgresql://db:5432/user_service_db
spring.datasource.username=postgres
spring.datasource.password=postgres

# === JPA / Hibernate ===
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# === Kafka Producer ===
spring.kafka.bootstrap-servers=kafka:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

kafka.topics.userEvents=user-events

# === Logging ===
logging.level.ru.saruat=DEBUG
logging.level.org.springframework.kafka=DEBUG

# === Spring Boot Actuator  dev - always, prod - when-authorized / never ===
management.endpoint.health.show-details=always

# Настройка Resilience4j CircuitBreaker
resilience4j.circuitbreaker.instances.notificationCB.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.notificationCB.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.notificationCB.ring-buffer-size-in-half-open-state=3
resilience4j.circuitbreaker.instances.notificationCB.ring-buffer-size-in-closed-state=5
resilience4j.circuitbreaker.instances.notificationCB.automatic-transition-from-open-to-half-open-enabled=true

#  API docs 
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Если сервис за gateway, может понадобиться:
server.forward-headers-strategy=framework